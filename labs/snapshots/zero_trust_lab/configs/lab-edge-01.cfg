hostname lab-edge-01
!
ip access-list extended USER_TO_RESTRICTED
 deny ip 10.20.20.0 0.0.0.255 10.30.30.0 0.0.0.255
 permit ip any any
!
ip access-list extended ADMIN_TO_RESTRICTED
 permit ip 10.10.10.0 0.0.0.255 10.30.30.0 0.0.0.255
 deny ip any any
!
interface GigabitEthernet0/0
 description user-subnet-ingress
 ip address 10.20.20.1 255.255.255.0
 ip access-group USER_TO_RESTRICTED in
 no shutdown
!
interface GigabitEthernet0/1
 description restricted-subnet
 ip address 10.30.30.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/2
 description admin-subnet
 ip address 10.10.10.1 255.255.255.0
 ip access-group ADMIN_TO_RESTRICTED in
 no shutdown
!
ip route 10.30.30.0 255.255.255.0 GigabitEthernet0/1
ip route 10.20.20.0 255.255.255.0 GigabitEthernet0/0
ip route 10.10.10.0 255.255.255.0 GigabitEthernet0/2
